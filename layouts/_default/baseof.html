<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script>
    window.UPTIME_CONFIG = {
      targetURL: "{{ .Site.Params.targetURL }}",
      siteName: "{{ .Site.Params.siteName }}",
      checkInterval: {{ .Site.Params.checkInterval }},
      cookieDays: {{ .Site.Params.cookieDays }}
    };
  </script>
  <script src="{{ "js/uptime.js" | relURL }}"></script>
</body>
</html>
